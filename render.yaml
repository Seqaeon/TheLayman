services:
  - type: web
    name: thelayman
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DB_PATH
        value: /var/data/the_layman.db
      - key: ADMIN_USERNAME
        sync: false          # Set this in the Render dashboard
      - key: ADMIN_PASSWORD
        sync: false          # Set this in the Render dashboard
      - key: PYTHON_VERSION
        value: "3.11"
    disk:
      name: thelayman-data
      mountPath: /var/data
      sizeGB: 1
